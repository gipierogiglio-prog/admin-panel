# Deploy admin-panel - Azure Pipelines
trigger:
  branches:
    include: [main]

variables:
  - group: devgiglio-env
  - group: devgiglio-secrets
  - name: APP_NAME
    value: admin-panel

pool: ubuntu-latest
steps:
  - bash: |
      echo $(GITHUB_TOKEN) | docker login ghcr.io -u gipierogiglio-prog --password-stdin
    displayName: "Login GHCR"

  - task: Docker@2
    displayName: "Build & Push"
    inputs:
      command: buildAndPush
      Dockerfile: Dockerfile
      containerRegistry: ""
      repository: ghcr.io/gipierogiglio-prog/admin-panel
      tags: latest

  - task: SSH@0
    displayName: "Deploy via SSH"
    inputs:
      sshEndpoint: devgiglio-vps-ssh
      runOptions: commands
      commands: |
        cd /opt/devgiglio
        docker pull ghcr.io/gipierogiglio-prog/admin-panel:latest
        docker compose up -d --force-recreate admin-panel
